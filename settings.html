<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Mobile Formatting -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Icon -->
        <link rel="icon" href="assets/Icon.ico">
        <!-- Title -->
        <title>Music Settings</title>
        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer">
        <!-- Fonts -->
        <link rel="preload" href="assets/Star.ttf" as="font" type="font/ttf" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Dancing+Script:wght@400..700&family=Indie+Flower&family=Orbitron:wght@400..900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <!-- JQUERY -->
        <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
        <!-- Scripts -->
        <script src="scripts/music.js"></script>
        <script src="scripts/name.js"></script>
        <script defer src="scripts/settings.js"></script>
        <!-- Styles -->
        <link rel="stylesheet" href="styles/main.css">
        <link rel="stylesheet" href="styles/settings.css">
    </head>
    <body>
    <section id="settings">
    <div id="music-vol">
        Music Volume
        <form class="slider-form" id="musicVolume">
            <input type="range" min="0" max="50" value="25" class="slider" id="musicVolume-slider">
        </form>
    </div>
    <div id="sound-vol">
        Sound Volume
        <form class="slider-form" id="soundVolume">
            <input type="range" min="0" max="50" value="25" class="slider" id="soundVolume-slider">
        </form>
    </div>
    <div id="testSound">
        Test Sound Effect <i class="fas fa-music"></i>
    </div>
    <a id="splash-page" href="index.html">Return to Splash Page</a>
</section>   
    <audio autoplay loop id="song">
        <source src="music/Hey!.mp3" type="audio/ogg">
    </audio>
    <audio id="TestSound">
        <source src="sounds/TestSound.mp3">
    </audio>
</html>
